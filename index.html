<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serfuplagas</title>
<style>
body{font-family:sans-serif;background:#0f1117;color:#e8eaf0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#181c27;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:2rem;width:min(380px,92vw);text-align:center}
h1{font-size:18px;margin-bottom:.5rem}
p{font-size:12px;color:#8b90a0;margin-bottom:1.5rem}
input{width:100%;padding:10px;background:#1e2333;border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#e8eaf0;font-size:14px;margin-bottom:10px;box-sizing:border-box;outline:none}
button{width:100%;padding:11px;background:#4f8ef7;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;margin-top:5px}
#msg{min-height:20px;font-size:12px;margin-top:10px;padding:8px;border-radius:6px;display:none;word-break:break-all;text-align:left}
.err{background:rgba(239,68,68,.2);color:#fca5a5;display:block!important}
.ok{background:rgba(34,197,94,.2);color:#86efac;display:block!important}
</style>
</head>
<body>
<div class="box">
  <h1>Serfuplagas</h1>
  <p>Gestion de servicios y rutas</p>
  <input type="email" id="email" placeholder="cdagnino@serfuplagas.cl">
  <input type="password" id="pwd" placeholder="Contrasena" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Entrar</button>
  <div id="msg"></div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
const cfg = {
  apiKey:"AIzaSyD4lq9ngsLXs3sgOFrxhnm9XzSKnfsq8Bk",
  authDomain:"calendario-servicios-sp.firebaseapp.com",
  databaseURL:"https://calendario-servicios-sp-default-rtdb.firebaseio.com",
  projectId:"calendario-servicios-sp",
  storageBucket:"calendario-servicios-sp.firebasestorage.app",
  messagingSenderId:"949833832357",
  appId:"1:949833832357:web:da6b9e1fec36ff1c947a4c"
};
const app = initializeApp(cfg);
const auth = getAuth(app);
const msg = document.getElementById('msg');
function showMsg(txt, type) { msg.className=type; msg.textContent=txt; }
window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('pwd').value;
  if(!email||!pwd){showMsg('Ingresa correo y contrasena','err');return;}
  showMsg('Conectando...','');  msg.style.display='block';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
    showMsg('Acceso correcto! Redirigiendo...','ok');
    setTimeout(()=>location.reload(),1000);
  } catch(e) {
    showMsg('Error: ' + e.code + ' | ' + e.message.slice(0,80),'err');
    console.error('LOGIN ERROR:', e.code, e.message);
  }
};
onAuthStateChanged(auth, user => {
  if(user) showMsg('Sesion activa: ' + user.email,'ok');
});
</script>
</body>
</html>
